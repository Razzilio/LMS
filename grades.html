<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Grades - MyLMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #eef2f7; }
        .navbar { background: #111; }
        footer {
            background: #f8f9fa;
            padding: 1rem 0;
            text-align: center;
            margin-top: 2rem;
        }
        .grade-card {
            border-radius: 1rem;
            transition: 0.3s;
        }
        .grade-A { background: #d4edda; color: #155724; }
        .grade-B { background: #cce5ff; color: #004085; }
        .grade-C { background: #fff3cd; color: #856404; }
        .grade-D { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🎓 MyLMS Student</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="student-dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="my-enrollments.html">My Enrollments</a></li>
                    <li class="nav-item"><a class="nav-link active" href="grades.html">Grades</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-danger ms-2 text-white" href="#" id="logoutBtn">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <h2 class="mb-4"><i class="bi bi-trophy-fill"></i> My Grades</h2>
        
        <!-- Summary Cards -->
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card text-center p-3">
                    <h5>GWA</h5>
                    <h2 class="text-primary" id="gwa">0.00</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center p-3">
                    <h5>Units Enrolled</h5>
                    <h2 class="text-success" id="totalUnits">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center p-3">
                    <h5>Passed</h5>
                    <h2 class="text-success" id="passedCount">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center p-3">
                    <h5>Failed</h5>
                    <h2 class="text-danger" id="failedCount">0</h2>
                </div>
            </div>
        </div>

        <!-- Grades Table -->
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Subject Grades</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead class="table-light">
                            <tr><th>Subject</th><th>Prelim</th><th>Midterm</th><th>Final</th><th>Average</th><th>Grade</th><th>Remarks</th></tr>
                        </thead>
                        <tbody id="gradesTable">
                            <tr><td colspan="7" class="text-center">Loading grades...</td></tr>
                        </tbody>
                     </table>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p class="text-muted mb-0">&copy; 2026 MyLMS. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
