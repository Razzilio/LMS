<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        footer {
            background: #f8f9fa;
            padding: 1rem 0;
            text-align: center;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">📘 MyLMS</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
            <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link active" href="data-entry.html">Enroll Now</a></li>
            <li class="nav-item"><a class="nav-link" href="table-list.html">Records</a></li>
            <li class="nav-item"><a class="nav-link btn btn-outline-light ms-2" href="login.html">Login</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container py-4">
        <h2 class="mb-4">📝 Add New Enrollment</h2>
        <form class="row g-3 needs-validation" novalidate>
            <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" id="studentName" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="studentEmail" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Program</label>
                <select class="form-select" id="studentCourse" required>
                    <option value="">Select Program</option>
                    <option>Bachelor of Science in Information Technology</option>
                    <option>Bachelor of Science in Business Administration</option>
                    <option>Bachelor of Elementary Education</option>
                    <option>Bachelor of Science in Psychology</option>
                    <option>Bachelor of Science in Accountancy</option>
                    <option>Bachelor of Science in Hospitality Management</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Enrollment Date</label>
                <input type="date" class="form-control" id="enrollmentDate" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Status</label>
                <select class="form-select" id="studentStatus" required>
                    <option>Active</option>
                    <option>Pending</option>
                    <option>Dropped</option>
                </select>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-success">Submit Enrollment</button>
                <button type="reset" class="btn btn-secondary">Clear</button>
            </div>
        </form>
    </div>

    <footer>
        <div class="container">
            <p class="text-muted mb-0">&copy; 2026 MyLMS</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
