<!DOCTYPE html>

    <style>
        body { background: #eef2f7; }
        .navbar { background: #111; }
        .header {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin: 20px 0;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .schedule-time {
            font-size: 13px;
            color: gray;
        }
        footer {
            background: #f8f9fa;
            padding: 1rem 0;
            text-align: center;
            margin-top: 2rem;
        }

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🎓 MyLMS Student</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">

            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="student-dashboard.html">Dashboard</a></li>

                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-3" id="dashboardContent">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p>Loading dashboard...</p>
